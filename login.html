<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XtraForm - Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    background: linear-gradient(to right, #2d3238, #3a4047);
    display:flex;
    justify-content:center;
    align-items:center;
}

.wrapper{
    width:380px;
    background:#1f242a;
    border-radius:8px;
    padding:30px 25px;
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
    color:#ccc;
}

.logo{
    text-align:center;
    margin-bottom:20px;
}

.logo h1{
    font-size:28px;
    color:#fff;
    font-weight:bold;
}

.logo span{
    color:#00bcd4;
}

.logo p{
    font-size:13px;
    margin-top:5px;
    color:#888;
}

.form-title{
    text-align:center;
    background:#3c434c;
    padding:10px;
    border-radius:5px;
    margin-bottom:20px;
    font-weight:bold;
    color:#ddd;
}

.form-group{
    margin-bottom:18px;
}

.form-group label{
    display:block;
    margin-bottom:6px;
    font-size:13px;
    color:#aaa;
}

.form-group input{
    width:100%;
    padding:10px;
    background:#2f353c;
    border:1px solid #444;
    border-radius:4px;
    color:#fff;
    outline:none;
    transition:0.3s;
}

.form-group input:focus{
    border-color:#00bcd4;
}

.options{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:13px;
    margin-bottom:20px;
    color:#aaa;
}

.options input{
    margin-right:5px;
}

.options a{
    color:#00bcd4;
    text-decoration:none;
}

.options a:hover{
    text-decoration:underline;
}

.btn{
    width:100%;
    padding:10px;
    background:#00bcd4;
    border:none;
    border-radius:4px;
    color:#fff;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    background:#0097a7;
}

.divider{
    margin:25px 0 15px;
    border-top:1px dashed #444;
}

.bottom-text{
    text-align:center;
    font-size:13px;
    margin-bottom:10px;
    color:#aaa;
}

.signup-btn{
    width:100%;
    padding:10px;
    background:#4a515b;
    border:none;
    border-radius:4px;
    color:#fff;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.signup-btn:hover{
    background:#5c6470;
}

</style>
</head>

<body>

<div class="wrapper">

    <div class="logo">
        <h1>Xtra<span>Form</span></h1>
        <p>Bootstrap 3 Xtra Form</p>
    </div>

    <div class="form-title">Sign In</div>

    <form>

        <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="Enter your email">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" placeholder="Enter your password">
        </div>

        <div class="options">
            <div>
                <input type="checkbox"> Remember me
            </div>
            <a href="#">Forgot password?</a>
        </div>

        <button type="submit" class="btn">SIGN IN</button>

        <div class="divider"></div>

        <div class="bottom-text">Don't have an account?</div>

        <button type="button" class="signup-btn">SIGN UP</button>

    </form>

</div>

</body>
</html>
