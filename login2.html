<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Auth UI</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-300 flex items-center justify-center h-screen">

<div class="w-[900px] h-[520px] bg-black rounded-2xl overflow-hidden shadow-2xl flex">

<!-- LEFT IMAGE SLIDER -->

<div class="w-1/2 relative overflow-hidden">

<div id="slider" class="flex transition-transform duration-700 h-full">

<img src="https://images.unsplash.com/photo-1503387762-592deb58ef4e"
class="w-full h-full object-cover flex-shrink-0">

<img src="https://images.unsplash.com/photo-1496307042754-b4aa456c4a2d"
class="w-full h-full object-cover flex-shrink-0">

<img src="https://images.unsplash.com/photo-1487958449943-2429e8be8625"
class="w-full h-full object-cover flex-shrink-0">

</div>

<div class="absolute bottom-6 left-6 text-white">

<h2 class="text-xl font-semibold">
Design your future
</h2>

<p class="text-sm text-gray-200">
Build your dream architecture.
</p>

</div>

</div>


<!-- RIGHT FORM -->

<div class="w-1/2 p-10 text-white">

<h2 class="text-xl font-semibold mb-6">
Create your account
</h2>

<form id="registerForm" class="space-y-4">

<input placeholder="Full Name"
class="w-full bg-black/30 border border-gray-600 text-white px-4 py-3 rounded-lg focus:outline-none focus:border-green-400">

<input placeholder="Email"
class="w-full bg-black/30 border border-gray-600 text-white px-4 py-3 rounded-lg focus:outline-none focus:border-green-400">

<div class="flex gap-3">

<input type="password" placeholder="Password"
class="w-1/2 bg-black/30 border border-gray-600 text-white px-4 py-3 rounded-lg">

<input type="password" placeholder="Confirm"
class="w-1/2 bg-black/30 border border-gray-600 text-white px-4 py-3 rounded-lg">

</div>

<button class="w-full py-3 bg-green-300 text-black rounded-lg font-semibold hover:bg-green-400">
Create account
</button>

<p class="text-sm text-gray-400 text-center">
Already have account?
<span onclick="showLogin()" class="text-green-400 cursor-pointer">Login</span>
</p>

</form>


<form id="loginForm" class="space-y-4 hidden">

<input placeholder="Email"
class="w-full bg-black/30 border border-gray-600 text-white px-4 py-3 rounded-lg">

<input type="password" placeholder="Password"
class="w-full bg-black/30 border border-gray-600 text-white px-4 py-3 rounded-lg">

<button class="w-full py-3 bg-green-300 text-black rounded-lg font-semibold hover:bg-green-400">
Login
</button>

<p class="text-sm text-gray-400 text-center">
Don't have account?
<span onclick="showRegister()" class="text-green-400 cursor-pointer">Register</span>
</p>

</form>

</div>

</div>


<script>

let index = 0
const slider = document.getElementById("slider")
const slides = slider.children.length

setInterval(()=>{
index++
if(index >= slides) index = 0
slider.style.transform = `translateX(-${index * 100}%)`
},3000)


function showLogin(){
document.getElementById("registerForm").classList.add("hidden")
document.getElementById("loginForm").classList.remove("hidden")
}

function showRegister(){
document.getElementById("loginForm").classList.add("hidden")
document.getElementById("registerForm").classList.remove("hidden")
}

</script>

</body>
</html>
