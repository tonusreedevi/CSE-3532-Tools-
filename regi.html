<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XtraForm - Sign Up</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, Helvetica, sans-serif;
    }

    body{
        height:100vh;
        background: linear-gradient(to right, #2d3238, #3a4047);
        display:flex;
        justify-content:center;
        align-items:center;
    }

    .wrapper{
        width:380px;
        background:#1f242a;
        border-radius:8px;
        padding:30px 25px;
        box-shadow:0 10px 25px rgba(0,0,0,0.4);
        color:#ccc;
    }

    .logo{
        text-align:center;
        margin-bottom:20px;
    }

    .logo h1{
        font-size:28px;
        color:#fff;
        font-weight:bold;
    }

    .logo span{
        color:#00bcd4;
    }

    .logo p{
        font-size:13px;
        margin-top:5px;
        color:#888;
    }

    .form-title{
        text-align:center;
        background:#3c434c;
        padding:10px;
        border-radius:5px;
        margin-bottom:20px;
        font-weight:bold;
        color:#ddd;
    }

    .form-group{
        margin-bottom:15px;
    }

    .form-group label{
        display:block;
        margin-bottom:6px;
        font-size:13px;
        color:#aaa;
    }

    .form-group input{
        width:100%;
        padding:10px;
        background:#2f353c;
        border:1px solid #444;
        border-radius:4px;
        color:#000000;
        outline:none;
        transition:0.3s;
    }

    .form-group input:focus{
        border-color:#dbdbdb;
    }

    .checkbox{
        margin:15px 0;
        font-size:13px;
        color:#aaa;
    }

    .checkbox input{
        margin-right:6px;
    }

    .btn{
        width:120px;
        padding:10px;
        background:#3e9bf3;
        border:none;
        border-radius:4px;
        color:#dddbdb;
        font-weight:bold;
        cursor:pointer;
        transition:0.3s;
    }

    .btn:hover{
        background:#0097a7;
    }

    .divider{
        margin:25px 0 15px;
        border-top:1px dashed #c5c4c4;
    }

    .bottom-text{
        text-align:center;
        font-size:13px;
        margin-bottom:10px;
        color:#e2dddd;
    }

    .signin-btn{
        width:100%;
        padding:10px;
        background:#eff1f3;
        border:none;
        border-radius:4px;
        color:#fff;
        font-weight:bold;
        cursor:pointer;
        transition:0.3s;
    }

    .signin-btn:hover{
        background:#1062df;
    }

</style>
</head>

<body>

<div class="wrapper">

    <div class="logo">
        <h1>Lab<span>Form</span></h1>
        <p>Practical</p>
    </div>

    <div class="form-title">Sign up</div>

    <form>

        <div class="form-group">
            <label>Username</label>
            <input type="text" placeholder="Username">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="Email">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" placeholder="Password">
        </div>

        <div class="form-group">
            <label>Retype password</label>
            <input type="password" placeholder="Retype password">
        </div>

        <div class="checkbox">
            <input type="checkbox"> Accept the terms and policies
        </div>

        <button type="submit" class="btn">SIGN UP</button>

        <div class="divider"></div>

        <div class="bottom-text">Already have an account?</div>

        <button type="button" class="signin-btn">LOG IN</button>

    </form>

</div>

</body>
</html>
